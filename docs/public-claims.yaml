schema_version: "1"
claims:
  python.pin:
    source:
      path: release-metadata.json
      pointer: /packages/python/pin
    targets:
      - path: README.md
        marker: python-pin
      - path: docs/softschema-guide.md
        marker: guide-python-pin
      - path: docs/installation.md
        marker: installation-python-pin
  npm.pin:
    source:
      path: release-metadata.json
      pointer: /packages/npm/pin
    targets:
      - path: README.md
        marker: npm-pin
      - path: docs/softschema-guide.md
        marker: guide-npm-pin
      - path: docs/installation.md
        marker: installation-npm-pin
  python.version:
    source:
      path: release-metadata.json
      pointer: /packages/python/version
    targets:
      - path: packages/python/README.md
        marker: python-version
  npm.version:
    source:
      path: release-metadata.json
      pointer: /packages/npm/version
    targets:
      - path: packages/typescript/README.md
        marker: npm-version
  conformance.status:
    source:
      path: release-metadata.json
      pointer: /conformance/status
    targets:
      - path: README.md
        marker: conformance-status
  conformance.version:
    source:
      path: release-metadata.json
