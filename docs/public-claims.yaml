  defaults:
    source:
      path: conformance/manifest.yaml
      pointer: /defaults
    targets:
      - path: docs/softschema-spec.md
        marker: artifact-defaults
  exit-codes:
    source:
      path: conformance/manifest.yaml
      pointer: /exit_codes
    targets:
      - path: docs/softschema-spec.md
        marker: exit-codes
  result-formats:
