        marker: result-formats
  policy.references:
    source:
      path: conformance/manifest.yaml
      pointer: /policies/references
    targets:
      - path: docs/softschema-spec.md
        marker: reference-policy
  policy.resource-bundles:
    source:
      path: conformance/manifest.yaml
      pointer: /policies/resource_bundles
    targets:
      - path: docs/softschema-spec.md
        marker: resource-bundle-policy
  agent-install-destinations:
    source:
      path: conformance/manifest.yaml
      pointer: /agent_install_destinations
    targets:
      - path: docs/agent-compatibility.md
        marker: agent-target-table

