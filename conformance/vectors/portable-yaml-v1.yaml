format: "softschema-vector-suite-v1"
id: "portable-yaml-v1"
description: "Both artifact profiles share one bounded JSON-compatible YAML domain."
operation: "portable-yaml"
cases:
  - id: "empty-document"
    input:
      text: ""
    expected:
      ok: true
      value: null
  - id: "mapping-and-negative-zero"
    input:
      text: |
        title: Ada
        count: -0
    expected:
      ok: true
      value:
        title: "Ada"
        count: 0
  - id: "bom-crlf-and-unicode"
    input:
      text: "\uFEFFname: 😀\r\nactive: true\r\n"
    expected:
      ok: true
      value:
        name: "😀"
        active: true
  - id: "yaml-twelve-date-is-string"
    input:
      text: |
        when: 2026-07-10
    expected:
      ok: true
      value:
        when: "2026-07-10"
  - id: "plain-leading-zero-is-string"
    input:
      text: "01"
    expected:
      ok: true
      value: "01"
  - id: "plain-trailing-dot-is-string"
    input:
      text: "1."
    expected:
      ok: true
      value: "1."
  - id: "plain-leading-zero-key-is-preserved"
    input:
      text: |
        01: value
    expected:
      ok: true
      value:
        '01': "value"
  - id: "duplicate-key-rejected"
    input:
      text: |
        name: a
        name: b
    expected:
      ok: false
      kind: "value_domain"
      path: "/name"
  - id: "non-string-key-rejected"
    input:
      text: |
        1: value
    expected:
      ok: false
      kind: "value_domain"
      path: ""
  - id: "alias-rejected"
    input:
      text: |
        value: &shared one
        copy: *shared
    expected:
      ok: false
      kind: "value_domain"
      path: "/copy"
  - id: "merge-key-rejected"
    input:
      text: |
        value:
          <<: {name: Ada}
    expected:
      ok: false
      kind: "value_domain"
      path: "/value"
  - id: "custom-tag-rejected"
    input:
      text: |
        value: !example tagged
    expected:
      ok: false
      kind: "value_domain"
      path: "/value"
  - id: "non-finite-number-rejected"
    input:
      text: |
        value: .nan
    expected:
      ok: false
      kind: "value_domain"
      path: "/value"
  - id: "multiple-documents-rejected"
    input:
      text: |
        a: 1
        ---
        b: 2
    expected:
      ok: false
      kind: "syntax"
      path: ""
  - id: "literal-next-line-rejected"
    input:
      text: "v: a\Nb\n"
      include_location: true
    expected:
      ok: false
      kind: "value_domain"
      path: ""
      line: 1
      column: 5
  - id: "literal-line-separator-rejected"
    input:
      text: "v: a\Lb\n"
      include_location: true
    expected:
      ok: false
      kind: "value_domain"
      path: ""
      line: 1
      column: 5
  - id: "literal-paragraph-separator-rejected"
    input:
      text: "v: a\Pb\n"
      include_location: true
    expected:
      ok: false
      kind: "value_domain"
      path: ""
      line: 1
      column: 5
  - id: "escaped-next-line-accepted"
    input:
      text: |
        v: "a\u0085b"
    expected:
      ok: true
      value:
        v: "a\Nb"
  - id: "escaped-line-separator-accepted"
    input:
      text: |
        v: "a\u2028b"
    expected:
      ok: true
      value:
        v: "a\Lb"
  - id: "escaped-paragraph-separator-accepted"
    input:
      text: |
        v: "a\u2029b"
    expected:
      ok: true
      value:
        v: "a\Pb"
  - id: "compact-flow-map-null-rejected"
    input:
      text: "{a:}"
      include_location: true
    expected:
      ok: false
      kind: "syntax"
      path: ""
      line: 1
      column: 3
  - id: "compact-flow-sequence-pair-null-rejected"
    input:
      text: "[a:]"
      include_location: true
    expected:
      ok: false
      kind: "syntax"
      path: ""
      line: 1
      column: 3
  - id: "separated-flow-null-accepted"
    input:
      text: "{a: }"
    expected:
      ok: true
      value:
        a: null
  - id: "coded-composer-error-is-syntax"
    input:
      text: "value: |+0\r\n x\r\n"
      include_location: true
    expected:
      ok: false
      kind: "syntax"
      path: ""
      line: 1
      column: 10
  - id: "syntax-precedes-prefix-value-domain-error"
    input:
      text: "{1"
      include_location: true
    expected:
      ok: false
      kind: "syntax"
      path: ""
      line: 1
      column: 3
  - id: "block-null-crlf-source"
    input:
      text: "value:\r\n"
      source_pointers:
        - "/value"
    expected:
      ok: true
      value:
        value: null
      sources:
        /value:
          start:
            line: 2
            column: 1
          end:
            line: 2
            column: 1
  - id: "flow-null-delimiter-source"
    input:
      text: "{value: }"
      source_pointers:
        - "/value"
    expected:
      ok: true
      value:
        value: null
      sources:
        /value:
          start:
            line: 1
            column: 9
          end:
            line: 1
            column: 9
  - id: "sequence-null-eof-source"
    input:
      text: "-"
      source_pointers:
        - "/0"
    expected:
      ok: true
      value:
        - null
      sources:
        /0:
          start:
            line: 1
            column: 2
          end:
            line: 1
            column: 2
  - id: "depth-limit"
    input:
      text: |
        a:
          b: 1
      limits:
        max_depth: 2
    expected:
      ok: false
      kind: "value_domain"
      path: "/a"
  - id: "flow-sequence-mapping-depth-limit"
    input:
      text: "[a: 1]"
      limits:
        max_depth: 2
      include_location: true
    expected:
      ok: false
      kind: "value_domain"
      path: "/0"
      line: 1
      column: 2
  - id: "flow-sequence-mapping-node-limit"
    input:
      text: "[a: 1]"
      limits:
        max_nodes_per_resource: 3
      include_location: true
    expected:
      ok: false
      kind: "value_domain"
      path: "/0/a"
      line: 1
      column: 5
  - id: "scalar-limit"
    input:
      text: |
        v: abc
      limits:
        max_scalar_codepoints: 2
    expected:
      ok: false
      kind: "value_domain"
      path: "/v"
