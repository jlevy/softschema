format: "softschema-vector-suite-v1"
id: "identity-v1"
description: "Contract, schema, and extension namespaces remain separate."
operation: "identity"
cases:
  - id: "contract-qualified"
    input:
      kind: "contract"
      value: "example.docs:Record/v1"
    expected:
      ok: true
      value: "example.docs:Record/v1"
  - id: "contract-is-not-schema-uri"
    input:
      kind: "schema"
      value: "example.docs:Record/v1"
    expected:
      ok: false
  - id: "schema-https"
    input:
      kind: "schema"
      value: "https://schemas.example/record/v1"
    expected:
      ok: true
      value: "https://schemas.example/record/v1"
  - id: "schema-urn"
    input:
      kind: "schema"
      value: "urn:example:softschema:record:v1"
    expected:
      ok: true
      value: "urn:example:softschema:record:v1"
  - id: "schema-rejects-http"
    input:
      kind: "schema"
      value: "http://schemas.example/record"
    expected:
      ok: false
  - id: "schema-rejects-fragment"
    input:
      kind: "schema"
      value: "https://schemas.example/record#part"
    expected:
      ok: false
  - id: "extension-reverse-dns"
    input:
      kind: "extension"
      value: "com.example.review"
    expected:
      ok: true
      value: "com.example.review"
  - id: "extension-https"
    input:
      kind: "extension"
      value: "https://schemas.example/extensions/review/v1"
    expected:
      ok: true
      value: "https://schemas.example/extensions/review/v1"
  - id: "extension-rejects-uppercase"
    input:
      kind: "extension"
      value: "Com.Example.Review"
    expected:
      ok: false
