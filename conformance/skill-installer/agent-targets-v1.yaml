version: "agent-targets-v1"
implicit_project_agents:
  - "codex"
  - "claude"
agents:
  - selector: "codex"
    project_root: ".agents/skills"
    personal_root: ".agents/skills"
    home_override: null
    override_root: null
  - selector: "claude"
    project_root: ".claude/skills"
    personal_root: ".claude/skills"
    home_override: "CLAUDE_CONFIG_DIR"
    override_root: "skills"
  - selector: "gemini"
    project_root: ".gemini/skills"
    personal_root: ".gemini/skills"
    home_override: "GEMINI_CLI_HOME"
    override_root: ".gemini/skills"
  - selector: "copilot"
    project_root: ".github/skills"
    personal_root: ".copilot/skills"
    home_override: "COPILOT_HOME"
    override_root: "skills"
  - selector: "cursor"
    project_root: ".cursor/skills"
    personal_root: ".cursor/skills"
    home_override: null
    override_root: null
  - selector: "windsurf"
    project_root: ".windsurf/skills"
    personal_root: ".codeium/windsurf/skills"
    home_override: null
    override_root: null
  - selector: "opencode"
    project_root: ".opencode/skills"
    personal_root: ".config/opencode/skills"
    home_override: null
    override_root: null
  - selector: "cline"
    project_root: ".cline/skills"
    personal_root: ".cline/skills"
    home_override: null
    override_root: null
  - selector: "roo"
    project_root: ".roo/skills"
    personal_root: ".roo/skills"
    home_override: null
    override_root: null
unsupported_agents:
  - selector: "aider"
    reason: "aider has no documented native Agent Skills target; use its read: compatibility recipe"
