version: "bootstrap-commands-v1"
commands:
  - kind: "local"
    command: "softschema doctor --json"
    argv:
      - "doctor"
      - "--json"
  - kind: "python-fallback"
    command: "uvx --from 'softschema==0.2.2' softschema doctor --json"
    argv:
      - "--from"
      - "softschema==0.2.2"
      - "softschema"
      - "doctor"
      - "--json"
  - kind: "node-fallback"
    command: "npx --yes softschema@0.2.2 doctor --json"
    argv:
      - "--yes"
      - "softschema@0.2.2"
      - "doctor"
      - "--json"
  - kind: "bun-fallback"
    command: "bunx --bun softschema@0.2.2 doctor --json"
    argv:
      - "--bun"
      - "softschema@0.2.2"
      - "doctor"
      - "--json"
