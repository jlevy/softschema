$defs:
  CastMember:
    additionalProperties: false
    description: One billed cast member.
    properties:
      actor:
        title: Actor
        type: string
      character:
        title: Character
        type: string
    required:
    - actor
    - character
    title: CastMember
    type: object
  ImdbRating:
    additionalProperties: false
    description: IMDb aggregate rating.
    properties:
      score:
        description: IMDb rating on a 0-10 scale.
        maximum: 10.0
        minimum: 0.0
        title: Score
        type: number
      total_votes:
        minimum: 0
        title: Total Votes
        type: integer
    required:
    - score
    - total_votes
    title: ImdbRating
    type: object
  MovieRatings:
    additionalProperties: false
    description: Aggregate ratings from external sources.
    properties:
      rotten_tomatoes:
        anyOf:
        - $ref: '#/$defs/RottenTomatoesRating'
        - type: 'null'
        default: null
      imdb:
        anyOf:
        - $ref: '#/$defs/ImdbRating'
        - type: 'null'
        default: null
    title: MovieRatings
    type: object
  RottenTomatoesRating:
    additionalProperties: false
    description: Rotten Tomatoes critic and audience scores.
    properties:
      critics_percent:
        description: Tomatometer score, 0-100.
        maximum: 100
        minimum: 0
        title: Critics Percent
        type: integer
      audience_percent:
        description: Popcornmeter score, 0-100.
        maximum: 100
        minimum: 0
        title: Audience Percent
        type: integer
      critic_review_count:
        minimum: 0
        title: Critic Review Count
        type: integer
    required:
    - critics_percent
    - audience_percent
    - critic_review_count
    title: RottenTomatoesRating
    type: object
additionalProperties: false
description: 'A small movie info page, similar to a public IMDB-style listing.


  The fields illustrate the structural variety a softschema artifact can carry:

  constrained scalars, enums, lists of strings, lists of structured records, and

  optional nested objects.'
properties:
  title:
    title: Title
    type: string
  release_year:
    minimum: 1888
    title: Release Year
    type: integer
  runtime_minutes:
    exclusiveMinimum: 0
    title: Runtime Minutes
    type: integer
  mpaa_rating:
    anyOf:
    - enum:
      - G
      - PG
      - PG-13
      - R
      - NC-17
      - NR
      type: string
    - type: 'null'
    default: null
    title: Mpaa Rating
  directors:
    items:
      type: string
    minItems: 1
    title: Directors
    type: array
  genres:
    description: Genre labels for the film.
    items:
      type: string
    minItems: 1
    title: Genres
    type: array
    x-softschema:
      group: taxonomy
      instruction: Pick from the standard IMDb genre vocabulary; at least one.
      owner: agent
      tier: constrained
  tagline:
    anyOf:
    - type: string
    - type: 'null'
    default: null
    title: Tagline
  synopsis:
    title: Synopsis
    type: string
  cast:
    items:
      $ref: '#/$defs/CastMember'
    title: Cast
    type: array
  ratings:
    $ref: '#/$defs/MovieRatings'
required:
- title
- release_year
- runtime_minutes
- directors
- genres
- synopsis
- ratings
title: MoviePage
type: object
$schema: https://json-schema.org/draft/2020-12/schema
$id: example.movies:MoviePage/v1
