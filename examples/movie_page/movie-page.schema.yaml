$defs:
  CastMember:
    additionalProperties: false
    description: One billed cast member.
    properties:
      actor:
        type: string
      character:
        type: string
    required:
    - actor
    - character
    type: object
  ImdbRating:
    additionalProperties: false
    description: IMDb aggregate rating.
    properties:
      score:
        description: IMDb rating on a 0-10 scale.
        maximum: 10
        minimum: 0
        type: number
      total_votes:
        minimum: 0
        type: integer
    required:
    - score
    - total_votes
    type: object
  MovieRatings:
    additionalProperties: false
    description: Aggregate ratings from external sources.
    properties:
      imdb:
        anyOf:
        - $ref: '#/$defs/ImdbRating'
        - type: 'null'
      rotten_tomatoes:
        anyOf:
        - $ref: '#/$defs/RottenTomatoesRating'
        - type: 'null'
    type: object
  RottenTomatoesRating:
    additionalProperties: false
    description: Rotten Tomatoes critic and audience scores.
    properties:
      audience_percent:
        description: Popcornmeter score, 0-100.
        maximum: 100
        minimum: 0
        type: integer
      critic_review_count:
        minimum: 0
        type: integer
      critics_percent:
        description: Tomatometer score, 0-100.
        maximum: 100
        minimum: 0
        type: integer
    required:
    - audience_percent
    - critic_review_count
    - critics_percent
    type: object
$schema: https://json-schema.org/draft/2020-12/schema
additionalProperties: false
description: |-
  A small movie info page, similar to a public IMDB-style listing.

  The fields illustrate the structural variety a softschema artifact can carry:
  constrained scalars, enums, lists of strings, lists of structured records, and
  optional nested objects.
properties:
  cast:
    items:
      $ref: '#/$defs/CastMember'
    type: array
  directors:
    items:
      type: string
    minItems: 1
    type: array
  genres:
    description: Genre labels for the film.
    items:
      type: string
    minItems: 1
    type: array
    x-softschema:
      group: taxonomy
      instruction: Pick from the standard IMDb genre vocabulary; at least one.
      owner: agent
      tier: constrained
  mpaa_rating:
    anyOf:
    - enum:
      - G
      - PG
      - PG-13
      - R
      - NC-17
      - NR
      type: string
    - type: 'null'
  ratings:
    $ref: '#/$defs/MovieRatings'
  release_year:
    minimum: 1888
    type: integer
  runtime_minutes:
    exclusiveMinimum: 0
    type: integer
  synopsis:
    type: string
  tagline:
    anyOf:
    - type: string
    - type: 'null'
  title:
    type: string
required:
- directors
- genres
- ratings
- release_year
- runtime_minutes
- synopsis
- title
type: object
x-softschema:
  contract: example.movies:MoviePage/v1
  schema_sha256: a8e4d444e314a34b3ad2eb48a7ec124fcacc601bdd522035283a7583f5930521
  softschema_format_version: 0.1.0
