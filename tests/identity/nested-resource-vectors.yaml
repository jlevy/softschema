      $ref: "https://schemas.example/supplied/child/"
    values: {}
    resources:
      https://schemas.example/supplied/:
        $schema: "https://json-schema.org/draft/2020-12/schema"
        $defs:
          child:
            $id: "child/"
            type: "object"
    expected:
      ok: true
      errors: []
      engine: "json_schema"
      skipped_reason: null
  - id: "unbased-relative-nested-id"
    schema:
