schema_locations:
  - "/$defs/child"
  - "/additionalProperties"
  - "/allOf/0"
  - "/anyOf/0"
  - "/contains"
  - "/contentSchema"
  - "/dependentSchemas/child"
  - "/else"
  - "/if"
  - "/items"
  - "/not"
  - "/oneOf/0"
  - "/patternProperties/x"
  - "/prefixItems/0"
  - "/properties/child"
  - "/propertyNames"
  - "/then"
  - "/unevaluatedItems"
  - "/unevaluatedProperties"
cases:
  - id: "nested-relative-fragment-ok"
    schema:
      $schema: "https://json-schema.org/draft/2020-12/schema"
      $id: "https://schemas.example/root/"
      $ref: "child/#/$defs/payload"
      $defs:
        child:
          $id: "child/"
          $defs:
            payload:
              type: "object"
              required:
                - "name"
              properties:
                name:
                  const: "Ada"
    values:
      name: "Ada"
    resources: {}
    expected:
      ok: true
      errors: []
      engine: "json_schema"
      skipped_reason: null
  - id: "absolute-nested-resource-under-idless-root-ok"
    schema:
      $schema: "https://json-schema.org/draft/2020-12/schema"
      $ref: "https://schemas.example/child"
