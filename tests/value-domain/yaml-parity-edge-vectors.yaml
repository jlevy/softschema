format: "portable-yaml-parity-edges-v1"
compact_flow_policy:
  message: "plain compact flow mapping values must be separated after ':'"
  rejected:
    - id: "plain-flow-map-empty-value"
      yaml: "{a:}"
      line: 1
      column: 3
    - id: "plain-flow-sequence-pair-empty-value"
      yaml: "[a:]"
      line: 1
      column: 3
    - id: "plain-flow-map-empty-value-before-comma"
      yaml: "{first:, second: value}"
      line: 1
      column: 7
  accepted:
    - id: "separated-flow-map-empty-value"
      yaml: "{a: }"
      value:
        a: null
    - id: "separated-flow-sequence-pair-empty-value"
      yaml: "[a: ]"
      value:
        - a: null
    - id: "quoted-flow-map-empty-value"
      yaml: "{\"a\":}"
      value:
        a: null
    - id: "plain-colon-content"
      yaml: "[a:null, https://example.test/path]"
      value:
        - "a:null"
        - "https://example.test/path"
composer_syntax_errors:
  - id: "invalid-block-scalar-header-with-error-code"
    yaml: "value: |+0\r\n x\r\n"
    message: "invalid YAML syntax"
    line: 1
    column: 10
    cli:
      kind: "parse_error"
      reason: "syntax"
      message: "artifact is not valid YAML"
      exit_code: 1
flow_opener_comment_policy:
  message: "invalid YAML syntax"
  rejected:
    - id: "flow-sequence-opener-comment-without-separation"
      yaml: |
        [# comment
          value]
      line: 1
      column: 2
    - id: "flow-map-opener-comment-without-separation"
      yaml: |
        {# comment
          value: 1}
      line: 1
      column: 2
  accepted:
    - id: "separated-flow-sequence-opener-comment"
      yaml: |
        [ # comment
          value]
      value:
        - "value"
    - id: "separated-flow-map-opener-comment"
      yaml: |
        { # comment
          value: 1}
      value:
        value: 1
tag_directive_policy:
  accepted:
    - id: "expanded-core-string-tag"
      yaml: |
        %TAG !e! tag:yaml.org,2002:
        ---
        !e!str a
      value: "a"
  rejected:
    - id: "expanded-custom-tag"
      yaml: |
        %TAG !e! tag:example.test,2026:
        ---
        !e!value a
      message: "YAML tag is not portable"
      path: ""
      line: 3
      column: 1
  syntax_rejected:
    - id: "undefined-named-tag-handle-after-earlier-semantic-error"
      yaml: |
        [!x a, !e!str b]
      message: "invalid YAML syntax"
      path: ""
      line: 1
      column: 8
explicit_numeric_tags:
  accepted:
    - id: "explicit-integer-leading-zero"
      yaml: |
        value: !!int 01
      value:
        value: 1
    - id: "explicit-integer-underscores"
      yaml: |
        value: !!int 1_000
      value:
        value: 1000
    - id: "explicit-float-integer-spelling"
      yaml: |
        value: !!float 1
      value:
        value: 1
    - id: "explicit-float-leading-zero"
      yaml: |
        value: !!float 01
      value:
        value: 1
    - id: "explicit-float-leading-plus"
      yaml: |
        value: !!float +1
      value:
        value: 1
    - id: "explicit-float-underscores"
      yaml: |
        value: !!float 1_000
      value:
        value: 1000
    - id: "explicit-float-trailing-point"
      yaml: |
        value: !!float 1.
      value:
        value: 1
  rejected:
    - id: "explicit-integer-empty-magnitude"
      yaml: |
        value: !!int +
      message: "invalid integer scalar"
      path: "/value"
      line: 1
      column: 8
    - id: "explicit-float-missing-magnitude"
      yaml: |
        value: !!float .
      message: "invalid numeric scalar"
      path: "/value"
      line: 1
      column: 8
    - id: "explicit-float-nonfinite"
      yaml: |
        value: !!float .inf
      message: "number must be finite"
      path: "/value"
      line: 1
      column: 8
first_error_precedence:
  - id: "custom-tag-before-alias"
    yaml: |
      [!x a, *x]
    message: "YAML tag is not portable"
    path: "/0"
    line: 1
    column: 2
  - id: "custom-tag-before-later-compact-flow"
    yaml: |
      [!x a, a:]
    message: "YAML tag is not portable"
    path: "/0"
    line: 1
    column: 2
  - id: "custom-tag-before-later-depth-limit"
    yaml: |
      [!x a, [b: 1]]
    limits:
      max_depth: 2
    message: "YAML tag is not portable"
    path: "/0"
    line: 1
    column: 2
  - id: "merge-before-key-node-limit"
    yaml: |
      {<<: {a: 1}}
    limits:
      max_nodes_per_resource: 1
    message: "merge keys are not portable"
    path: ""
    line: 1
    column: 2
  - id: "duplicate-before-value-node-limit"
    yaml: |
      {a: 1, a: 2}
    limits:
      max_nodes_per_resource: 4
    message: "duplicate mapping key"
    path: "/a"
    line: 1
    column: 8
  - id: "nested-flow-child-before-implicit-map-depth"
    yaml: |
      [[a: 1]]
    limits:
      max_depth: 1
    message: "maximum depth exceeded"
    path: "/0"
    line: 1
    column: 2
  - id: "nested-implicit-flow-map-depth"
    yaml: |
      [[a: 1]]
    limits:
      max_depth: 2
    message: "maximum depth exceeded"
    path: "/0/0"
    line: 1
    column: 3
syntax_classification:
  - id: "document-end-without-document"
    yaml: |
      ...
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 1
  - id: "flow-sequence-null-implicit-key"
    yaml: "[: 1]"
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 2
  - id: "flow-sequence-explicit-empty-key"
    yaml: "[? : 1]"
    kind: "value"
    message: "mapping keys must be strings"
    path: "/0"
    line: 1
    column: 3
  - id: "flow-map-empty-key"
    yaml: "{: 1}"
    kind: "value"
    message: "mapping keys must be strings"
    path: ""
    line: 1
    column: 3
  - id: "nested-compact-flow-syntax-before-depth-limit"
    yaml: |
      [[a:]]
    limits:
      max_depth: 2
    kind: "syntax"
    message: "plain compact flow mapping values must be separated after ':'"
    path: ""
    line: 1
    column: 4
  - id: "unterminated-flow-after-earlier-semantic-error"
    yaml: "[!x a, ["
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 9
  - id: "bad-double-quoted-escape-after-earlier-semantic-error"
    yaml: "[!x a, \"\\q\"]"
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 10
  - id: "duplicate-yaml-directive"
    yaml: |
      %YAML 1.2
      %YAML 1.2
      ---
      a
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 2
    column: 1
  - id: "duplicate-tag-handle-directive"
    yaml: |
      %TAG !e! tag:a:
      %TAG !e! tag:b:
      ---
      !e!x a
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 2
    column: 1
  - id: "unsupported-yaml-version-directive"
    yaml: |
      %YAML 1.3
      ---
      a
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 1
  - id: "malformed-tag-handle-directive"
    yaml: |
      %TAG !e tag:x
      ---
      a
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 8
  - id: "malformed-hex-escape"
    yaml: "\"\\x1\""
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 4
  - id: "multiline-implicit-key"
    yaml: |
      a:
        b
       c: d
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 3
    column: 3
  - id: "empty-anchor-name"
    yaml: |
      & a
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 2
  - id: "unterminated-verbatim-tag"
    yaml: |
      !<bad a
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 6
  - id: "empty-directive-name"
    yaml: |
      %
    kind: "syntax"
    message: "invalid YAML syntax"
    path: ""
    line: 1
    column: 2
empty_null_anchors:
  - id: "block-map-eof"
    yaml: "value:"
    value:
      value: null
    anchors:
      - pointer: "/value"
        span:
          start:
            line: 1
            column: 7
          end:
            line: 1
            column: 7
  - id: "block-map-crlf"
    yaml: "value:\r\n"
    value:
      value: null
    anchors:
      - pointer: "/value"
        span:
          start:
            line: 2
            column: 1
          end:
            line: 2
            column: 1
  - id: "block-map-comment-eof"
    yaml: "value: # empty"
    value:
      value: null
    anchors:
      - pointer: "/value"
        span:
          start:
            line: 1
            column: 8
          end:
            line: 1
            column: 8
  - id: "quoted-hash-key-empty-value-eof"
    yaml: "\"a # b\":"
    value:
      'a # b': null
    anchors:
      - pointer: "/a # b"
        span:
          start:
            line: 1
            column: 9
          end:
            line: 1
            column: 9
  - id: "block-sequence-eof"
    yaml: "-"
    value:
      - null
    anchors:
      - pointer: "/0"
        span:
          start:
            line: 1
            column: 2
          end:
            line: 1
            column: 2
  - id: "block-sequence-crlf"
    yaml: "-\r\n"
    value:
      - null
    anchors:
      - pointer: "/0"
        span:
          start:
            line: 2
            column: 1
          end:
            line: 2
            column: 1
  - id: "nested-block-sequence-crlf-diagnostic"
    yaml: "values:\r\n  -\r\n"
    value:
      values:
        - null
    anchors:
      - pointer: "/values/0"
        span:
          start:
            line: 3
            column: 1
          end:
            line: 3
            column: 1
    diagnostic:
      path: "/values/0"
      line: 3
      column: 1
  - id: "block-sequence-comment-eof"
    yaml: "- # empty"
    value:
      - null
    anchors:
      - pointer: "/0"
        span:
          start:
            line: 1
            column: 3
          end:
            line: 1
            column: 3
  - id: "block-sequence-comment-crlf"
    yaml: "- # empty\r\n"
    value:
      - null
    anchors:
      - pointer: "/0"
        span:
          start:
            line: 2
            column: 1
          end:
            line: 2
            column: 1
  - id: "flow-map-eof"
    yaml: "{value: }"
    value:
      value: null
    anchors:
      - pointer: "/value"
        span:
          start:
            line: 1
            column: 9
          end:
            line: 1
            column: 9
  - id: "flow-map-before-trailing-crlf"
    yaml: "{value: }\r\n"
    value:
      value: null
    anchors:
      - pointer: "/value"
        span:
          start:
            line: 1
            column: 9
          end:
            line: 1
            column: 9
  - id: "flow-map-crlf-before-delimiter"
    yaml: "{value:\r\n}\r\n"
    value:
      value: null
    anchors:
      - pointer: "/value"
        span:
          start:
            line: 2
            column: 1
          end:
            line: 2
            column: 1
  - id: "flow-sequence-pair-eof"
    yaml: "[value: ]"
    value:
      - value: null
    anchors:
      - pointer: "/0/value"
        span:
          start:
            line: 1
            column: 9
          end:
            line: 1
            column: 9
  - id: "flow-sequence-pair-crlf-before-delimiter"
    yaml: "[value:\r\n]\r\n"
    value:
      - value: null
    anchors:
      - pointer: "/0/value"
        span:
          start:
            line: 2
            column: 1
          end:
            line: 2
            column: 1
  - id: "flow-map-comma-and-eof"
    yaml: "{a: , b: }"
    value:
      a: null
      b: null
    anchors:
      - pointer: "/a"
        span:
          start:
            line: 1
            column: 5
          end:
            line: 1
            column: 5
      - pointer: "/b"
        span:
          start:
            line: 1
            column: 10
          end:
            line: 1
            column: 10
