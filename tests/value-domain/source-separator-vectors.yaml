format: "portable-yaml-source-separators-v1"
value_error_message: "literal YAML source line separator is not portable"
artifact_error:
  reason: "value_domain"
  message: "artifact contains a non-portable YAML value"
  path: ""
literal_cases:
  - id: "literal-u0085-after-lf"
    code_point: "U+0085"
    yaml: "prefix: ok\nvalue: before\Nafter\n"
    line: 2
    column: 14
  - id: "literal-u2028-after-bom-crlf"
    code_point: "U+2028"
    yaml: "\uFEFFprefix: ok\r\nvalue: before\Lafter\r\n"
    line: 2
    column: 14
  - id: "literal-u2029-after-cr-and-astral"
    code_point: "U+2029"
    yaml: "prefix: ok\rvalue: 😀 before\Pafter\r"
    line: 2
    column: 16
escaped_case:
  id: "escaped-source-separators-remain-string-values"
  yaml: |
    values:
      - "\u0085"
      - "\u2028"
      - "\u2029"
  value:
    values:
      - "\N"
      - "\L"
      - "\P"
