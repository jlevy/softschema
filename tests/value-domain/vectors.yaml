- id: "core-scalars-and-timestamps"
  yaml: |
    date: 2026-07-09
    timestamp: 2026-07-09T12:34:56Z
    truth: true
    nothing: null
  value:
    date: "2026-07-09"
    timestamp: "2026-07-09T12:34:56Z"
    truth: true
    nothing: null
- id: "safe-number-boundaries"
  yaml: |
    low: -9007199254740991
    high: 9007199254740991
    hex: 0x1f
    octal: 0o17
    fraction: 1.5
    subnormal: 5e-324
    underflow: 1e-4000
  value:
    low: -9007199254740991
    high: 9007199254740991
    hex: 31
    octal: 15
    fraction: 1.5
    subnormal: 5e-324
    underflow: 0
- id: "negative-zero-spellings"
  yaml: |
    integer: -0
    decimal: -0.0
    exponent: -0e10
    positive: +0.000e-4
  value:
    integer: 0
    decimal: 0
    exponent: 0
    positive: 0
- id: "quoted-yaml-looking-values"
  yaml: |
    binary: '!!binary SGk='
    set: '!!set {a}'
    number: '1e20'
  value:
    binary: "!!binary SGk="
    set: "!!set {a}"
    number: "1e20"
- id: "unicode-bom-and-crlf"
  yaml: "\uFEFFname: Lévy 😀\r\nline: second\r\n"
  value:
    name: "Lévy 😀"
    line: "second"
- id: "duplicate-key"
  yaml: |
    value: 1
