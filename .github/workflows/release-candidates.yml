name: Release candidates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.12"
          python-version: "3.13"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.11"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Build candidates once
        run: |
          mkdir -p release-candidates/python release-candidates/npm
          uv build --out-dir release-candidates/python
          bun install --cwd packages/typescript --frozen-lockfile
          bun run --cwd packages/typescript build
          cd packages/typescript
          npm pack --ignore-scripts \
            --pack-destination "$GITHUB_WORKSPACE/release-candidates/npm"
          cd "$GITHUB_WORKSPACE"
          cd release-candidates
          find python npm -type f ! -name .gitignore -print0 | sort -z | \
            xargs -0 sha256sum > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Upload candidates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-candidates
          path: release-candidates
          if-no-files-found: error

  smoke-candidates:
    needs: build-candidates
    runs-on: ubuntu-latest
    steps:
      - name: Download candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-candidates
          path: release-candidates

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.12"
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Verify checksums
        working-directory: release-candidates
        run: sha256sum --check SHA256SUMS

      - name: Smoke Python wheel outside the checkout
        run: |
          uv venv "$RUNNER_TEMP/softschema-python"
          uv pip install --python "$RUNNER_TEMP/softschema-python/bin/python" \
            release-candidates/python/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/softschema-python/bin/softschema" --version
          "$RUNNER_TEMP/softschema-python/bin/softschema" docs spec > /dev/null

      - name: Smoke Python sdist outside the checkout
        run: |
          uv venv "$RUNNER_TEMP/softschema-sdist"
          uv pip install --python "$RUNNER_TEMP/softschema-sdist/bin/python" \
            release-candidates/python/*.tar.gz
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/softschema-sdist/bin/softschema" --version
          "$RUNNER_TEMP/softschema-sdist/bin/softschema" docs spec > /dev/null

      - name: Smoke npm tarball outside the checkout
        run: |
          mkdir "$RUNNER_TEMP/softschema-node"
          cd "$RUNNER_TEMP/softschema-node"
          npm init --yes > /dev/null
          npm install --ignore-scripts --no-audit --no-fund \
            "$GITHUB_WORKSPACE"/release-candidates/npm/*.tgz
          node --input-type=module -e \
            'import { validateArtifact } from "softschema"; if (typeof validateArtifact !== "function") process.exit(1)'
          ./node_modules/.bin/softschema --version
          ./node_modules/.bin/softschema docs spec > /dev/null
