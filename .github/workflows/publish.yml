name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.12"
          enable-cache: true
          python-version: "3.12"

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install dependencies
        # strif is a reviewed, zero-dependency, first-party package; exempt it from the
        # global 14-day cool-off so the latest release is allowed (mirrors ci.yml). Bump
        # the date to adopt a newer strif. See pyproject [tool.uv] exclude-newer-package.
        run: uv sync --all-extras --exclude-newer-package strif=2026-06-03

      - name: Run linting
        run: uv run python devtools/lint.py --check

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Verify built version matches the release tag
        if: github.event_name == 'release'
        # The Python version is derived from git via uv-dynamic-versioning. Confirm it
        # equals the tag so PyPI and npm publish the same number (the "share one version"
        # invariant). A dirty tree or commits after the tag would derive a dev/post
        # version and is caught here before upload.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WHEEL="$(ls dist/softschema-*.whl)"
          BUILT="$(basename "$WHEEL" | sed -E 's/^softschema-([^-]+)-.*/\1/')"
          echo "tag=$TAG built=$BUILT"
          test "$TAG" = "$BUILT" || {
            echo "::error::release tag v$TAG does not match the built Python version $BUILT"
            exit 1
          }

      - name: Publish to PyPI
        # Only a published release may upload. workflow_dispatch runs the build/test/guard
        # steps above as a dry run but never publishes, so a manual dispatch on a branch
        # cannot push a dev/post version (e.g. 0.1.3.devN+sha) to PyPI.
        if: github.event_name == 'release'
        run: uv publish --trusted-publishing always

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    permissions:
      id-token: write # OIDC trusted publishing (no token) + provenance
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Use an npm that supports trusted publishing
        # Pinned, not @latest: OIDC trusted publishing needs npm >= 11.5.1, and this job
        # holds id-token: write, so it must not pull an unpinned runner. Bump deliberately.
        run: npm install -g npm@11.5.1

      - name: Verify package version matches the release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          test "$TAG" = "$PKG" || {
            echo "::error::release tag v$TAG does not match packages/typescript/package.json version $PKG"
            exit 1
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check (lint, types, tests)
        run: bun run check

      - name: Build
        run: bun run build

      - name: Lint the publishable package (publint)
        run: bun run publint

      - name: Publish to npm (trusted publishing, OIDC)
        # Only a published release may upload (workflow_dispatch is build/check-only), so a
        # manual dispatch cannot publish the current package.json version without the
        # tag-to-version guard above.
        # No NODE_AUTH_TOKEN: authentication is via the OIDC id-token above, configured as a
        # trusted publisher on npmjs.com. --provenance attaches a build attestation (also
        # OIDC-based). Requires the package to already exist with a trusted publisher set up
        # (see the one-time bootstrap in docs/publishing.md).
        if: github.event_name == 'release'
        run: npm publish --access public --provenance
