name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-candidates:
    uses: ./.github/workflows/release-candidates.yml

  publish-pypi:
    if: github.event_name == 'release'
    needs: release-candidates
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-candidates
          path: release-candidates

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.12"
          python-version: "3.13"

      - name: Verify candidate and release versions
        run: |
          cd release-candidates
          sha256sum --check SHA256SUMS
          TAG="${GITHUB_REF_NAME#v}"
          WHEEL="$(basename "$(ls python/softschema-*.whl)")"
          BUILT="$(printf '%s' "$WHEEL" | sed -E 's/^softschema-([^-]+)-.*/\1/')"
          test "$TAG" = "$BUILT" || {
            echo "::error::release tag v$TAG does not match Python candidate $BUILT"
            exit 1
          }

      - name: Publish exact Python candidates
        run: uv publish release-candidates/python/* --trusted-publishing always

  publish-npm:
    if: github.event_name == 'release'
    needs: release-candidates
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-candidates
          path: release-candidates

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Use npm trusted publishing
        run: npm install --global npm@11.5.1

      - name: Verify candidate and release versions
        run: |
          cd release-candidates
          sha256sum --check SHA256SUMS
          TAG="${GITHUB_REF_NAME#v}"
          TARBALL="$(ls npm/softschema-*.tgz)"
          BUILT="$(tar -xOf "$TARBALL" package/package.json | \
            sed -n 's/.*"version": "\([^"]*\)".*/\1/p' | head -1)"
          test "$TAG" = "$BUILT" || {
            echo "::error::release tag v$TAG does not match npm candidate $BUILT"
            exit 1
          }

      - name: Publish exact npm candidate
        run: npm publish release-candidates/npm/*.tgz --access public --provenance
