name: Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Build and freeze release candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      logical-version: ${{ steps.coordinates.outputs.logical-version }}
      npm-tag: ${{ steps.coordinates.outputs.npm-tag }}
      prerelease: ${{ steps.coordinates.outputs.prerelease }}
      source-commit: ${{ steps.source.outputs.commit }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Peel and record the source commit
        id: source
        run: echo "commit=$(git rev-parse 'HEAD^{commit}')" >> "$GITHUB_OUTPUT"

      - name: Require protected release authority
        if: github.event_name == 'push'
        env:
          SOURCE_COMMIT: ${{ steps.source.outputs.commit }}
        run: |
          test "$GITHUB_REPOSITORY" = "jlevy/softschema"
          test '${{ github.ref_protected }}' = 'true'
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$SOURCE_COMMIT" origin/main

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: false
          python-version: "3.12.13"

      - name: Set up pinned Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"

      - name: Set up pinned Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install frozen Python dependencies without builds
        env:
          UV_NO_BUILD: "1"
        run: uv sync --all-extras --group audit --frozen --no-cache --no-install-project

      - name: Audit the frozen Python dependency environment
        # pip-audit is installed from uv.lock. Its advisory service has no portable
        # severity scale, so every known finding and every incomplete collection fails.
        # Run before the reviewed local checkout is installed because unpublished local
        # projects have no PyPI advisory record and strict collection must remain enabled.
        run: uv run --no-sync pip-audit --local --strict --progress-spinner=off

      - name: Install the trusted checkout for preflight
        run: uv pip install --no-build-isolation --no-deps --editable .

      - name: Install frozen TypeScript dependencies
        working-directory: packages/typescript
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Validate release metadata and tag
        run: |
          if test "$GITHUB_EVENT_NAME" = "push"; then
            uv run --no-sync python -m devtools.release check --tag "$GITHUB_REF_NAME"
          else
            uv run --no-sync python -m devtools.release check
          fi

      - name: Export ecosystem release coordinates
        id: coordinates
        run: |
          if test "$GITHUB_EVENT_NAME" = "push"; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="v$(jq -r .logical_version release-metadata.json)"
          fi
          uv run --no-sync python -m devtools.release coordinates "$TAG" > coordinates.json
          echo "logical-version=$(jq -r .logical_version coordinates.json)" >> "$GITHUB_OUTPUT"
          echo "npm-tag=$(jq -r .npm_tag coordinates.json)" >> "$GITHUB_OUTPUT"
          echo "prerelease=$(jq -r .prerelease coordinates.json)" >> "$GITHUB_OUTPUT"

      - name: Run Python lint and tests
        run: |
          uv run --no-sync python devtools/lint.py --check
          uv run --no-sync pytest

      - name: Run TypeScript checks
        working-directory: packages/typescript
        run: bun run check

      - name: Audit the frozen TypeScript dependency graph
        # Moderate, high, and critical advisories block publication without downgrade.
        working-directory: packages/typescript
        run: bun audit --audit-level=moderate

      - name: Build deterministic conformance kit
        run: |
          mkdir -p release-out
          uv run --no-sync python -m devtools.release archive-conformance \
            release-out/conformance-kit.tar.gz

      - name: Derive build metadata before either package build
        env:
          SOURCE_COMMIT: ${{ steps.source.outputs.commit }}
        run: |
          uv run --no-sync python -m devtools.release build-metadata build-metadata.json \
            --source-commit "$SOURCE_COMMIT" \
            --conformance-archive release-out/conformance-kit.tar.gz

      - name: Build Python artifacts once with hash-locked build dependencies
        run: |
          uv build --python 3.12.13 --build-constraint build-constraints.txt \
            --require-hashes --clear --no-create-gitignore --out-dir python-dist
          cp python-dist/* release-out/

      - name: Build and pack npm artifact once without lifecycle scripts
        working-directory: packages/typescript
        run: |
          test "$(npm --version)" = "11.16.0"
          bun run build
          bun run publint
          npm pack --ignore-scripts --pack-destination ../../release-out

      - name: Record exact package subjects
        id: artifacts
        run: |
          echo "wheel=$(find release-out -maxdepth 1 -name '*.whl' -print -quit)" >> "$GITHUB_OUTPUT"
          echo "sdist=$(find release-out -maxdepth 1 -name 'softschema-*.tar.gz' -print -quit)" >> "$GITHUB_OUTPUT"
          echo "npm=$(find release-out -maxdepth 1 -name '*.tgz' -print -quit)" >> "$GITHUB_OUTPUT"

      - name: Resolve and audit the locked npm artifact consumer
        env:
          NPM_SUBJECT: ${{ steps.artifacts.outputs.npm }}
        run: |
          test "$(npm --version)" = "11.16.0"
          CUTOFF="$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          uv run --no-sync python devtools/npm_consumer.py create release-out/npm-consumer \
            --tarball "$NPM_SUBJECT" --npm-version 11.16.0 --cutoff "$CUTOFF"

      - name: Copy exact metadata and unprivileged smoke support
        run: uv run --no-sync python devtools/frozen_artifact_smoke.py stage release-out

      - name: Generate wheel SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.artifacts.outputs.wheel }}
          format: spdx-json
          output-file: release-out/softschema-python-wheel.spdx.json
          syft-version: v1.45.1
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Generate sdist SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.artifacts.outputs.sdist }}
          format: spdx-json
          output-file: release-out/softschema-python-sdist.spdx.json
          syft-version: v1.45.1
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Generate npm SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.artifacts.outputs.npm }}
          format: spdx-json
          output-file: release-out/softschema-npm.spdx.json
          syft-version: v1.45.1
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Generate and verify the external release manifest
        env:
          LOGICAL_VERSION: ${{ steps.coordinates.outputs.logical-version }}
          SOURCE_COMMIT: ${{ steps.source.outputs.commit }}
          WHEEL: ${{ steps.artifacts.outputs.wheel }}
          SDIST: ${{ steps.artifacts.outputs.sdist }}
          NPM: ${{ steps.artifacts.outputs.npm }}
        run: |
          uv run --no-sync python -m devtools.release manifest \
            release-out/release-manifest.json \
            --logical-version "$LOGICAL_VERSION" --source-commit "$SOURCE_COMMIT" \
            --subject "wheel=$WHEEL" --subject "sdist=$SDIST" --subject "npm=$NPM" \
            --subject "conformance=release-out/conformance-kit.tar.gz" \
            --subject "release_metadata=release-out/release-metadata.json" \
            --subject "build_metadata=release-out/build-metadata.json" \
            --subject "sbom=release-out/softschema-python-wheel.spdx.json" \
            --subject "sbom=release-out/softschema-python-sdist.spdx.json" \
            --subject "sbom=release-out/softschema-npm.spdx.json"
          uv run --no-sync python -m devtools.release verify \
            release-out/release-manifest.json release-out

      - name: Generate non-cyclic release controls and freeze the state driver
        run: |
          cp devtools/release_state.py release-out/devtools/release_state.py
          python3 release-out/devtools/release_state.py controls release-out

      - name: Generate transfer checksums last
        run: >-
          uv run --no-sync python
          devtools/frozen_artifact_smoke.py checksums release-out

      - name: Upload immutable candidate transfer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate
          path: release-out
          compression-level: 0
          include-hidden-files: false
          if-no-files-found: error
          retention-days: 90

  smoke:
    name: Install and execute exact candidate bytes
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout exact source for transfer verification
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ needs.preflight.outputs.source-commit }}

      - name: Download immutable candidate transfer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release-out

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: false
          python-version: "3.12.13"

      - name: Verify transfer checksums before any candidate install
        run: >-
          uv run --no-project --python 3.12.13 python
          devtools/frozen_artifact_smoke.py verify-checksums release-out

      - name: Set up pinned Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"

      - name: Set up pinned Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Smoke the exact wheel and locked npm consumer from an unrelated directory
        run: |
          uv run --no-project --python 3.12.13 python \
            release-out/devtools/frozen_artifact_smoke.py smoke release-out

  draft-release:
    name: Freeze draft assets and attest primary subjects
    needs: [preflight, smoke]
    if: github.event_name == 'push' && needs.smoke.result == 'success'
    runs-on: ubuntu-latest
    environment: github-release
    outputs:
      prerelease: ${{ steps.initial.outputs.prerelease }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact source for transfer verification
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ needs.preflight.outputs.source-commit }}

      - name: Require immutable GitHub releases before any release mutation
        run: |
          test "$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/immutable-releases" --jq .enabled)" = "true"

      - name: Download immutable candidate transfer
        id: candidate
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release-out

      - name: Recover the exact transfer from durable draft assets
        if: steps.candidate.outcome == 'failure'
        run: |
          rm -rf release-out recovery
          mkdir recovery
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern 'release-recovery.*' --dir recovery
          gh attestation verify "recovery/release-recovery.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
            --source-digest "$GITHUB_SHA" --source-ref "$GITHUB_REF" \
            --deny-self-hosted-runners
          test "$(wc -c < recovery/release-recovery.sha256)" -le 256
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.(tar|py)$' \
            recovery/release-recovery.sha256)" -eq 2
          ! LC_ALL=C grep -Ev \
            '^[0-9a-f]{64}  release-recovery\.(tar|py)$' \
            recovery/release-recovery.sha256
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.tar$' \
            recovery/release-recovery.sha256)" -eq 1
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.py$' \
            recovery/release-recovery.sha256)" -eq 1
          (cd recovery && sha256sum --check --strict release-recovery.sha256)
          for name in release-recovery.tar release-recovery.py; do
            gh attestation verify "recovery/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
              --source-digest "$GITHUB_SHA" --source-ref "$GITHUB_REF" \
              --deny-self-hosted-runners
          done
          python3 recovery/release-recovery.py extract-recovery \
            recovery/release-recovery.tar release-out
          SOURCE_COMMIT="$(jq -er .source_commit release-out/release-manifest.json)"
          for name in release-recovery.tar release-recovery.py release-recovery.sha256; do
            gh attestation verify "recovery/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
              --source-digest "$SOURCE_COMMIT" --source-ref "$GITHUB_REF" \
              --deny-self-hosted-runners
          done

      - name: Verify the complete transfer before release access
        run: |
          python3 devtools/frozen_artifact_smoke.py \
            verify-checksums release-out

      - name: Recreate deterministic durable recovery assets
        run: |
          rm -rf recovery
          mkdir recovery
          python3 release-out/devtools/release_state.py recovery-bundle \
            release-out recovery/release-recovery.tar
          cp release-out/devtools/release_state.py recovery/release-recovery.py
          (cd recovery && sha256sum release-recovery.tar release-recovery.py \
            > release-recovery.sha256)

      - name: Attest the exact recovery bundle and frozen bootstrap
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: recovery/release-recovery.sha256
          show-summary: true

      - name: Attest the recovery checksum inventory
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: recovery/release-recovery.sha256
          show-summary: true

      - name: Classify the existing release and asset inventory
        id: initial
        run: |
          python3 release-out/devtools/release_state.py github-plan release-out \
            --repo "$GITHUB_REPOSITORY" --tag "$GITHUB_REF_NAME" \
            --recovery-directory recovery \
            > github-initial.json
          echo "release=$(jq -er .release github-initial.json)" >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ needs.preflight.outputs.prerelease }}" >> "$GITHUB_OUTPUT"

      - name: Create the missing draft without creating or moving a tag
        if: steps.initial.outputs.release == 'absent'
        env:
          PRERELEASE: ${{ needs.preflight.outputs.prerelease }}
        run: |
          if test "$PRERELEASE" = "true"; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --verify-tag --target "$(jq -er .source_commit release-out/release-manifest.json)" \
              --title "$GITHUB_REF_NAME" --notes-from-tag --draft --prerelease --latest=false
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --verify-tag --target "$(jq -er .source_commit release-out/release-manifest.json)" \
              --title "$GITHUB_REF_NAME" --notes-from-tag --draft --latest=false
          fi

      - name: Reclassify and upload only missing exact assets
        run: |
          python3 release-out/devtools/release_state.py github-plan release-out \
            --repo "$GITHUB_REPOSITORY" --tag "$GITHUB_REF_NAME" \
            --recovery-directory recovery \
            > github-upload.json
          jq -r '.missing[]' github-upload.json | while IFS= read -r name; do
            if test -f "recovery/$name"; then
              source="recovery/$name"
            else
              source="release-out/$name"
            fi
            gh release upload "$GITHUB_REF_NAME" "$source" \
              --repo "$GITHUB_REPOSITORY"
          done

      - name: Require the exact draft asset inventory
        run: |
          python3 release-out/devtools/release_state.py github-plan release-out \
            --repo "$GITHUB_REPOSITORY" --tag "$GITHUB_REF_NAME" \
            --recovery-directory recovery \
            --require-state exact > github-exact.json

      - name: Attest exact primary manifest subjects
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release-out/PRIMARY-SHA256SUMS
          show-summary: true

  classify-registries:
    name: Classify public registry state
    needs: [preflight, draft-release]
    if: github.event_name == 'push' && needs.draft-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      attestations: read
      contents: read
    outputs:
      pypi_state: ${{ steps.classify.outputs.pypi_state }}
      npm_state: ${{ steps.classify.outputs.npm_state }}
    steps:
      - name: Checkout exact source for transfer verification
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ needs.preflight.outputs.source-commit }}

      - name: Download immutable candidate transfer
        id: candidate
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release-out

      - name: Recover the exact transfer from durable draft assets
        if: steps.candidate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf release-out recovery
          mkdir recovery
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern 'release-recovery.*' --dir recovery
          gh attestation verify "recovery/release-recovery.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
            --source-digest "$GITHUB_SHA" --source-ref "$GITHUB_REF" \
            --deny-self-hosted-runners
          test "$(wc -c < recovery/release-recovery.sha256)" -le 256
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.(tar|py)$' \
            recovery/release-recovery.sha256)" -eq 2
          ! LC_ALL=C grep -Ev \
            '^[0-9a-f]{64}  release-recovery\.(tar|py)$' \
            recovery/release-recovery.sha256
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.tar$' \
            recovery/release-recovery.sha256)" -eq 1
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.py$' \
            recovery/release-recovery.sha256)" -eq 1
          (cd recovery && sha256sum --check --strict release-recovery.sha256)
          for name in release-recovery.tar release-recovery.py; do
            gh attestation verify "recovery/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
              --source-digest "$GITHUB_SHA" --source-ref "$GITHUB_REF" \
              --deny-self-hosted-runners
          done
          python3 recovery/release-recovery.py extract-recovery \
            recovery/release-recovery.tar release-out
          SOURCE_COMMIT="$(jq -er .source_commit release-out/release-manifest.json)"
          for name in release-recovery.tar release-recovery.py release-recovery.sha256; do
            gh attestation verify "recovery/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
              --source-digest "$SOURCE_COMMIT" --source-ref "$GITHUB_REF" \
              --deny-self-hosted-runners
          done

      - name: Verify transfer and classify exact public bytes
        id: classify
        run: |
          python3 devtools/frozen_artifact_smoke.py \
            verify-checksums release-out
          python3 release-out/devtools/release_state.py pypi-plan release-out \
            > pypi-plan.json
          python3 release-out/devtools/release_state.py npm-plan release-out \
            > npm-plan.json
          echo "pypi_state=$(jq -er .state pypi-plan.json)" >> "$GITHUB_OUTPUT"
          echo "npm_state=$(jq -er .state npm-plan.json)" >> "$GITHUB_OUTPUT"

  publish-pypi:
    name: Publish only missing PyPI subjects
    needs: [preflight, draft-release, classify-registries]
    if: >-
      github.event_name == 'push' &&
      needs.classify-registries.result == 'success' &&
      needs.classify-registries.outputs.pypi_state != 'complete'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      attestations: read
      contents: read
      id-token: write
    steps:
      - name: Checkout exact source for transfer verification
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ needs.preflight.outputs.source-commit }}

      - name: Download immutable candidate transfer
        id: candidate
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release-out

      - name: Recover the exact transfer from durable draft assets
        if: steps.candidate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf release-out recovery
          mkdir recovery
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern 'release-recovery.*' --dir recovery
          gh attestation verify "recovery/release-recovery.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
            --source-digest "$GITHUB_SHA" --source-ref "$GITHUB_REF" \
            --deny-self-hosted-runners
          test "$(wc -c < recovery/release-recovery.sha256)" -le 256
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.(tar|py)$' \
            recovery/release-recovery.sha256)" -eq 2
          ! LC_ALL=C grep -Ev \
            '^[0-9a-f]{64}  release-recovery\.(tar|py)$' \
            recovery/release-recovery.sha256
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.tar$' \
            recovery/release-recovery.sha256)" -eq 1
          test "$(LC_ALL=C grep -Ec \
            '^[0-9a-f]{64}  release-recovery\.py$' \
            recovery/release-recovery.sha256)" -eq 1
          (cd recovery && sha256sum --check --strict release-recovery.sha256)
          for name in release-recovery.tar release-recovery.py; do
