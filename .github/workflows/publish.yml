name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.12"
          enable-cache: true
          python-version: "3.12"

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linting
        run: uv run python devtools/lint.py --check

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    permissions:
      id-token: write # OIDC trusted publishing (no token) + provenance
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Use an npm that supports trusted publishing
        run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1

      - name: Verify package version matches the release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          test "$TAG" = "$PKG" || {
            echo "::error::release tag v$TAG does not match packages/typescript/package.json version $PKG"
            exit 1
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check (lint, types, tests)
        run: bun run check

      - name: Build
        run: bun run build

      - name: Publish to npm (trusted publishing, OIDC)
        # No NODE_AUTH_TOKEN: authentication is via the OIDC id-token above, configured as a
        # trusted publisher on npmjs.com. --provenance attaches a build attestation (also
        # OIDC-based). Requires the package to already exist with a trusted publisher set up
        # (see the one-time bootstrap in docs/publishing.md).
        run: npm publish --access public --provenance
