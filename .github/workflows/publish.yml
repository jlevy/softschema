      - name: Publish only after both registries verify
        if: steps.state.outputs.publish == 'true'
        env:
          PRERELEASE: ${{ needs.draft-release.outputs.prerelease }}
        run: |
          test "$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/immutable-releases" --jq .enabled)" = "true"
          if test "$PRERELEASE" = "true"; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft=false --prerelease --latest=false
          else
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft=false --prerelease=false --latest
          fi

      - name: Require the published release to retain exact bytes and channel flags
        run: |
          python3 release-out/devtools/release_state.py github-plan release-out \
            --repo "$GITHUB_REPOSITORY" --tag "$GITHUB_REF_NAME" \
            --recovery-directory recovery --require-state exact \
            --require-published --require-latest --attempts 8 --delay 5 \
            > github-published.json
