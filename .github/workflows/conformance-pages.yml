name: Publish conformance schema namespace

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: conformance-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build immutable schema candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require protected main source
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          if [ "$SOURCE_REPOSITORY" != "jlevy/softschema" ] || \
             [ "$SOURCE_REF" != "refs/heads/main" ] || \
             [ "$SOURCE_REF_PROTECTED" != "true" ]; then
            echo "Conformance publication requires jlevy/softschema protected main." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Build versioned schema candidate
        run: python conformance/publication.py build pages-out

      - name: Reconstruct the complete namespace and refuse replacement
        run: >-
          python conformance/publication.py verify-predeploy pages-out
          --promotion-marker conformance/publication-promoted.sha256

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: pages-out

      - name: Stage independent verification input
        run: |
          mkdir verification
          cp -R pages-out verification/pages-out
          cp conformance/publication.py verification/publication.py
          sha256sum pages-out/publication-index.json | cut -d ' ' -f 1 \
            > verification/publication-promoted.sha256

      - name: Upload verification input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conformance-pages-verification
          path: verification
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy exact candidate
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  verify:
    name: Verify live immutable bytes
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Download verification input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: conformance-pages-verification

      - name: Verify status, redirects, media types, and bytes
        run: >-
          python publication.py verify-live pages-out
          --promotion-marker publication-promoted.sha256
