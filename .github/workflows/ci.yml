name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  release-candidates:
    uses: ./.github/workflows/release-candidates.yml

  artifact-smoke:
    needs: release-candidates
    name: Artifact smoke (${{ matrix.os }}, py${{ matrix.python-version }}, node${{ matrix.node-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11.15"
            node-version: "22.12.0"
          - os: ubuntu-latest
            python-version: "3.14.6"
            node-version: "24.18.0"
          - os: macos-latest
            python-version: "3.11.15"
            node-version: "22.12.0"
          - os: macos-latest
            python-version: "3.14.6"
            node-version: "24.18.0"
          - os: windows-latest
            python-version: "3.11.15"
            node-version: "22.12.0"
          - os: windows-latest
            python-version: "3.14.6"
            node-version: "24.18.0"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Download exact candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidates
          path: release-candidates

      - name: Install uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.12"
          python-version: ${{ matrix.python-version }}

      - name: Install exact Python
        run: uv python install "${{ matrix.python-version }}"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify transferred checksums
        run: |
          node <<'NODE'
          const { createHash } = require("node:crypto");
          const { readFileSync } = require("node:fs");
          for (const line of readFileSync("release-candidates/SHA256SUMS", "utf8").trim().split("\n")) {
            const match = line.match(/^([0-9a-f]{64})  (.+)$/);
            if (!match) throw new Error(`invalid checksum line: ${line}`);
            const actual = createHash("sha256").update(readFileSync(`release-candidates/${match[2]}`)).digest("hex");
            if (actual !== match[1]) throw new Error(`checksum mismatch: ${match[2]}`);
          }
          NODE

      - name: Smoke wheel and sdist outside the checkout
        working-directory: ${{ runner.temp }}
        run: |
          uv run --no-project --with "$GITHUB_WORKSPACE"/release-candidates/python/*.whl \
            softschema --version
          uv run --no-project --with "$GITHUB_WORKSPACE"/release-candidates/python/*.whl \
            softschema docs spec > /dev/null
          uv run --no-project --with "$GITHUB_WORKSPACE"/release-candidates/python/*.tar.gz \
            softschema --version
          uv run --no-project --with "$GITHUB_WORKSPACE"/release-candidates/python/*.tar.gz \
            softschema docs spec > /dev/null

      - name: Smoke npm tarball outside the checkout
        working-directory: ${{ runner.temp }}
        run: |
          mkdir softschema-node
          cd softschema-node
          npm init --yes > /dev/null
          npm install --ignore-scripts --no-audit --no-fund \
            "$GITHUB_WORKSPACE"/release-candidates/npm/*.tgz
          node --input-type=module -e \
            'import { validateArtifact } from "softschema"; if (typeof validateArtifact !== "function") process.exit(1)'
          ./node_modules/.bin/softschema --version
          ./node_modules/.bin/softschema docs spec > /dev/null

  build:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.12"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install dependencies
        # strif is a reviewed, zero-dependency, first-party package; exempt it from the
        # global 14-day cool-off so the latest release is allowed. Bump the date to adopt
        # a newer strif. See pyproject [tool.uv] exclude-newer-package.
        run: uv sync --all-extras --exclude-newer-package strif=2026-06-03

      - name: Run linting
        run: uv run python devtools/lint.py --check

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

  golden:
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.12"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install dependencies
        # strif is a reviewed, zero-dependency, first-party package; exempt it from the
        # global 14-day cool-off so the latest release is allowed. Bump the date to adopt
        # a newer strif. See pyproject [tool.uv] exclude-newer-package.
        run: uv sync --all-extras --exclude-newer-package strif=2026-06-03

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Run golden corpus (Python CLI)
        run: SOFTSCHEMA_IMPL=py bash tests/golden/run.sh

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint:ci

      - name: Unit tests + coverage gate
        run: bun test --coverage

      - name: Build
        run: bun run build

      - name: Lint the publishable package (publint)
        run: bun run publint

      - name: Run golden corpus (TypeScript CLI under Node, the published runtime)
        working-directory: ${{ github.workspace }}
        run: SOFTSCHEMA_IMPL=ts bash tests/golden/run.sh

      - name: Run golden corpus (TypeScript CLI under Bun)
        working-directory: ${{ github.workspace }}
        run: SOFTSCHEMA_IMPL=ts-bun bash tests/golden/run.sh

  cross-impl:
    # Direct Python-vs-TypeScript(Node) semantic comparison on the same inputs, so a
    # parity break is reported as a divergence instead of one side drifting from goldens.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.12"
          enable-cache: true
          python-version: "3.13"

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: uv sync --all-extras --exclude-newer-package strif=2026-06-03

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build the TypeScript CLI
        working-directory: packages/typescript
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Cross-implementation parity diff
        run: bash tests/golden/cross-impl-diff.sh
