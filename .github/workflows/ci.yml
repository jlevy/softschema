name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.12"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install dependencies
        # strif is a reviewed, zero-dependency, first-party package; exempt it from the
        # global 14-day cool-off so the latest release is allowed. Bump the date to adopt
        # a newer strif. See pyproject [tool.uv] exclude-newer-package.
        run: uv sync --all-extras --exclude-newer-package strif=2026-06-03

      - name: Run linting
        run: uv run python devtools/lint.py --check

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

  golden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.12"
          enable-cache: true
          python-version: "3.13"

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install dependencies
        # strif is a reviewed, zero-dependency, first-party package; exempt it from the
        # global 14-day cool-off so the latest release is allowed. Bump the date to adopt
        # a newer strif. See pyproject [tool.uv] exclude-newer-package.
        run: uv sync --all-extras --exclude-newer-package strif=2026-06-03

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run golden corpus (Python CLI)
        run: SOFTSCHEMA_IMPL=py bash tests/golden/run.sh

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint:ci

      - name: Unit tests + coverage gate
        run: bun test --coverage

      - name: Build
        run: bun run build

      - name: Run golden corpus (TypeScript CLI)
        working-directory: ${{ github.workspace }}
        run: SOFTSCHEMA_IMPL=ts bash tests/golden/run.sh
