name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build Python artifacts with hash-locked build dependencies
        run: |
          uv build --python "${{ matrix.python-version }}" \
            --build-constraint build-constraints.txt --require-hashes --clear \
            --no-create-gitignore --out-dir python-dist

      - name: Install wheel and dependencies without builds
        # strif is a reviewed, zero-dependency, first-party package; exempt it from the
        # global 14-day cool-off so the latest release is allowed. Bump the date to adopt
        # a newer strif. See pyproject [tool.uv] exclude-newer-package.
        env:
          UV_NO_BUILD: "1"
        run: |
          uv sync --all-extras --frozen --no-cache --no-install-project \
            --exclude-newer-package strif=2026-06-03
          uv pip install --no-build --no-deps python-dist/*.whl
          uv run --no-sync python devtools/verify_installed_wheel.py python-dist/*.whl

      - name: Run linting
        run: uv run --no-sync python devtools/lint.py --check

      - name: Run tests
        run: uv run --no-sync pytest

  golden:
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build test wheel with hash-locked build dependencies
        run: |
          uv build --wheel --python "${{ matrix.python-version }}" \
            --build-constraint build-constraints.txt --require-hashes --clear \
            --no-create-gitignore --out-dir python-test-dist

      - name: Install wheel and dependencies without builds
        # strif is a reviewed, zero-dependency, first-party package; exempt it from the
        # global 14-day cool-off so the latest release is allowed. Bump the date to adopt
        # a newer strif. See pyproject [tool.uv] exclude-newer-package.
        env:
          UV_NO_BUILD: "1"
        run: |
          uv sync --all-extras --frozen --no-cache --no-install-project \
            --exclude-newer-package strif=2026-06-03
          uv pip install --no-build --no-deps python-test-dist/*.whl
          uv run --no-sync python devtools/verify_installed_wheel.py python-test-dist/*.whl

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Run golden corpus (Python CLI)
        run: SOFTSCHEMA_IMPL=py bash tests/golden/run.sh

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint:ci

      - name: Unit tests + coverage gate
        run: bun test --coverage

      - name: Build
        run: bun run build

      - name: Lint the publishable package (publint)
        run: bun run publint

      - name: Run golden corpus (TypeScript CLI under Node, the published runtime)
        working-directory: ${{ github.workspace }}
        run: SOFTSCHEMA_IMPL=ts bash tests/golden/run.sh

      - name: Run golden corpus (TypeScript CLI under Bun)
        working-directory: ${{ github.workspace }}
        run: SOFTSCHEMA_IMPL=ts-bun bash tests/golden/run.sh

  dependency-audit:
    name: Frozen dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: false
          python-version: "3.13.7"

      - name: Install the frozen Python audit environment without builds
        env:
          UV_NO_BUILD: "1"
        run: uv sync --all-extras --group audit --frozen --no-cache --no-install-project

      - name: Audit the frozen Python environment
        # pip-audit is an exact audit-group dependency in uv.lock. Its advisory source
        # does not expose one portable severity scale, so every known vulnerability fails.
        # --strict also fails if dependency collection is incomplete; no result is waived.
        run: uv run --no-sync pip-audit --local --strict --progress-spinner=off

      - name: Install pinned Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install the frozen TypeScript audit environment without scripts
        working-directory: packages/typescript
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Audit the frozen TypeScript dependency graph
        # Bun's audit implementation is part of the pinned runtime. Moderate, high, and
        # critical advisories fail this step; the exit status is never suppressed.
        working-directory: packages/typescript
        run: bun audit --audit-level=moderate

  cross-impl:
    # Direct Python-vs-TypeScript(Node) byte-comparison on the same inputs, so a parity
    # break is reported as a divergence rather than as one side drifting from the goldens.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          python-version: "3.13"

      - name: Set up Python
        run: uv python install

      - name: Set supply-chain cool-off cutoff
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build test wheel with hash-locked build dependencies
        run: |
          uv build --wheel --python "3.13" \
            --build-constraint build-constraints.txt --require-hashes --clear \
            --no-create-gitignore --out-dir python-test-dist

      - name: Install wheel and dependencies without builds
        env:
          UV_NO_BUILD: "1"
        run: |
          uv sync --all-extras --frozen --no-cache --no-install-project \
            --exclude-newer-package strif=2026-06-03
          uv pip install --no-build --no-deps python-test-dist/*.whl
          uv run --no-sync python devtools/verify_installed_wheel.py python-test-dist/*.whl

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build the TypeScript CLI
        working-directory: packages/typescript
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Run draft conformance cases under Python, Node, and Bun
        run: uv run --no-sync python conformance/run.py --implementation all

  artifact-candidate:
    name: Build and freeze cross-platform smoke candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pinned uv and build Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: false
          python-version: "3.12.13"

      - name: Set up the pinned resolution Node and npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"

      - name: Set up pinned build Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install frozen Python build dependencies without builds
        env:
          UV_NO_BUILD: "1"
        run: uv sync --all-extras --frozen --no-cache --no-install-project

      - name: Install frozen TypeScript build dependencies without scripts
        working-directory: packages/typescript
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Derive the 14-day npm resolution cutoff
        id: cutoff
        shell: bash
        run: echo "value=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build once, resolve the cold consumer, audit, and checksum
        run: |
          test "$(npm --version)" = "11.16.0"
          uv run --no-sync python devtools/frozen_artifact_smoke.py build artifact-out \
            --npm-version 11.16.0 --cutoff "${{ steps.cutoff.outputs.value }}"

      - name: Verify the frozen candidate before upload
        run: uv run --no-sync python devtools/frozen_artifact_smoke.py verify-checksums artifact-out

      - name: Upload the exact cross-platform smoke candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-artifact-candidate
          path: artifact-out
          compression-level: 0
          include-hidden-files: false
          if-no-files-found: error
          retention-days: 7

  artifact-smoke:
    name: Artifact smoke (${{ matrix.os }}, py${{ matrix.python }}, node${{ matrix.node }})
    needs: artifact-candidate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: 3.11.15
            node: 22.12.0
            bun: 1.3.11
          - os: ubuntu-latest
            python: 3.14.6
            node: 24.18.0
            bun: 1.3.14
          - os: macos-latest
            python: 3.11.15
            node: 22.12.0
            bun: 1.3.11
          - os: macos-latest
            python: 3.14.6
            node: 24.18.0
            bun: 1.3.14
          - os: windows-latest
            python: 3.11.15
            node: 22.12.0
            bun: 1.3.11
          - os: windows-latest
            python: 3.14.6
            node: 24.18.0
            bun: 1.3.14
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout exact source for transfer verification
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Download the exact cross-platform smoke candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-artifact-candidate
          path: artifact-out

      - name: Install uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: false
          python-version: ${{ matrix.python }}

      - name: Prove Windows junction roots are rejected
        if: runner.os == 'Windows' && matrix.python == '3.11.15'
        shell: pwsh
        run: |
          $probe = Join-Path $env:RUNNER_TEMP "softschema-junction-$env:GITHUB_RUN_ID"
          $target = Join-Path $probe "candidate"
          $junction = Join-Path $probe "candidate-junction"
          Remove-Item -Recurse -Force $probe -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $target | Out-Null
          Set-Content -NoNewline -Path (Join-Path $target "artifact.whl") -Value "wheel"
          uv run --no-project --python "${{ matrix.python }}" python `
            devtools/frozen_artifact_smoke.py checksums $target
          New-Item -ItemType Junction -Path $junction -Target $target -ErrorAction Stop | Out-Null
          $rejected = Start-Process -FilePath "uv" -Wait -PassThru -NoNewWindow `
            -ArgumentList @(
              "run", "--no-project", "--python", "${{ matrix.python }}", "python",
              "devtools/frozen_artifact_smoke.py", "verify-checksums", $junction
            )
          if ($rejected.ExitCode -eq 0) {
            throw "redirected Windows junction candidate was accepted"
          }

      - name: Verify candidate checksums before any candidate install
        run: >-
          uv run --no-project --python "${{ matrix.python }}" python
          devtools/frozen_artifact_smoke.py verify-checksums artifact-out

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ matrix.bun }}

      - name: Inspect, install, and execute the exact candidate
        env:
          UV_NO_BUILD: "1"
        run: >-
          uv run --no-project --python "${{ matrix.python }}" python
          artifact-out/devtools/frozen_artifact_smoke.py smoke artifact-out
